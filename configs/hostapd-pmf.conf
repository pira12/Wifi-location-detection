# PMF-enabled hostapd config used by util/pmf-demo.
# Demonstrates 802.11w (Protected Management Frames) mitigation of deauth.
# Do not use as a production AP config.

interface=wlan2
driver=nl80211
ssid=wifipi-pmf-demo
hw_mode=g
channel=6
ieee80211n=1
auth_algs=1
wmm_enabled=1

# WPA2 with PMF mandatory (ieee80211w=2).
wpa=2
wpa_key_mgmt=WPA-PSK-SHA256
wpa_pairwise=CCMP
rsn_pairwise=CCMP
wpa_passphrase=wifipi-pmf-demo-lab
ieee80211w=2
