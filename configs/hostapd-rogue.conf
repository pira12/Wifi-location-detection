# Rogue AP for the evil-twin demo.
# Run via scripts/06-evil-twin-up.sh
#
# EDIT THIS BEFORE RUNNING — at minimum the SSID needs to match the test
# AP you're cloning.

interface=wlan2
driver=nl80211

# Set this to the SSID of YOUR own test AP for the evil-twin effect.
ssid=MyTestNetwork

hw_mode=g
channel=6
ieee80211n=1
auth_algs=1
wmm_enabled=1

# Open AP for demo simplicity. To mimic a WPA2-protected target instead,
# uncomment the block below and set wpa_passphrase to whatever the real
# AP uses (the victim will only auto-join the rogue if security/passwords
# match the saved network).
#
# wpa=2
# wpa_key_mgmt=WPA-PSK
# wpa_pairwise=CCMP
# rsn_pairwise=CCMP
# wpa_passphrase=changeme
