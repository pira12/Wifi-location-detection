# Test AP for the SECOND Pi to act as the victim's network.
# This is the AP you ATTACK in the demo.
#
# Run with: sudo hostapd /path/to/this/file

interface=wlan1
driver=nl80211
ssid=MyTestNetwork

hw_mode=g
channel=6
ieee80211n=1
auth_algs=1
wmm_enabled=1

wpa=2
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP

# Deliberately weak password so the offline crack demo finishes in seconds.
# DO NOT reuse this password anywhere real.
wpa_passphrase=password123

# Protected Management Frames (802.11w):
#   0 = disabled  (deauth attack works)
#   1 = optional
#   2 = required  (deauth attack should FAIL — use this for the mitigation demo)
ieee80211w=0
